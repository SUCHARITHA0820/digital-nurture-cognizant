# Application configuration

# Troubleshooting tip: if the embedded Tomcat's default port (8080) is
# already in use and the application fails to start, uncomment the line
# below and change it to a free port.
# server.port=8081

# Enable DEBUG level logging for our own package so that the debug
# statements inside Country's constructor, getters, and setters are
# visible in the console (Spring Boot's default root level is INFO).
logging.level.com.cognizant=DEBUG
